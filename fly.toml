app = 'saree-wardrobe'
primary_region = 'sjc'

[build]

[env]
  DATABASE_URL = 'sqlite:////data/wardrobe.db'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[[mounts]]
  source = 'wardrobe_data'
  destination = '/data'
